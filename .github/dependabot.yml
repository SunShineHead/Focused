version: 2
updates:

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Hong_Kong"
    open-pull-requests-limit: 5
    groups:
      ml-stack:
        patterns: ["lightgbm", "scikit-learn", "numpy", "pandas"]
      dev-tools:
        patterns: ["pytest*", "flake8*", "pip-audit"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Hong_Kong"
    open-pull-requests-limit: 5
    groups:
      actions-core:
        patterns: ["actions/*"]
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"

  # Node.js (next-platform-starter)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Hong_Kong"
    open-pull-requests-limit: 5
    groups:
      stripe:
        patterns: ["stripe*", "@stripe/*"]
      next-ecosystem:
        patterns: ["next", "react", "react-dom"]
    versioning-strategy: "increase-if-necessary"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
