[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "oasis"
version = "1.0.0"
description = "Focused OASIS Platform"
readme = "README.md"
requires-python = ">=3.10"
authors = [
  { name="Wallace Huang" }
]

dependencies = []

[project.scripts]
oasis = "oasis.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
